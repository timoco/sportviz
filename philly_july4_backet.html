<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Philadelphia July 4th Matchup Probability Tree</title>
    <!-- Load clean production build of D3 directly -->
    <script src="https://cloudflare.com"></script>
    <script>
        if (typeof d3 === 'undefined') {
            document.write('<script src="d3.min.js"><\/script>');
        }
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #f8fafc; margin-bottom: 5px; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        p { color: #64748b; margin-top: 0; margin-bottom: 25px; font-size: 14px; }
        
        /* Interactive Controls Card */
        .controls-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .controls-card label { font-size: 13px; color: #9ca3af; font-weight: 600; }
        .controls-card input[type=range] {
            accent-color: #38bdf8;
            cursor: pointer;
            width: 150px;
        }
        .weight-display { font-family: monospace; color: #38bdf8; font-weight: bold; font-size: 14px; }

        /* SVG Structure Styling */
        #tree-container { background: #0b0f19; border-radius: 16px; width: 100%; max-width: 1000px; }
        .node text { font-size: 13px; fill: #e2e8f0; font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .node--leaf text { font-weight: 600; fill: #f8fafc; }
        
        /* Smooth Custom Bezier Connections */
        .link {
            fill: none;
            stroke: rgba(51, 65, 85, 0.4);
            stroke-width: 2.5px;
            transition: stroke 0.25s, stroke-width 0.25s;
        }
        .link-active {
            stroke: #38bdf8 !important;
            stroke-width: 4px !important;
        }

        /* Beautiful Dynamic Tooltips */
        .tooltip {
            position: absolute;
            padding: 12px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            line-height: 1.5;
            transition: opacity 0.15s ease-out;
        }
        .tooltip-header { color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .tooltip-stat { font-size: 16px; font-weight: bold; color: #34d399; }
    </style>
</head>
<body>

    <h1>Philadelphia July 4th Round of 16 Tree</h1>
    <p>Adjust variables below to dynamically simulate probability distributions cascading down to Lincoln Financial Field.</p>
    
    <!-- Interactive Variable Controller Panel -->
    <div class="controls-card">
        <div>
            <label for="germany-slider">🇩🇪 Germany Advance Chance: </label>
            <input type="range" id="germany-slider" min="0" max="100" value="85">
            <span id="germany-val" class="weight-display">85%</span>
        </div>
        <div style="border-left: 1px solid #1f2937; padding-left: 20px;">
            <label for="france-slider">🇫🇷 France Advance Chance: </label>
            <input type="range" id="france-slider" min="0" max="100" value="55">
            <span id="france-val" class="weight-display">55%</span>
        </div>
    </div>

    <div id="tree-container"></div>
    <div id="tooltip" class="tooltip"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof d3 === 'undefined') return;

            const width = 1000;
            const height = 500;
            const margin = { top: 20, right: 200, bottom: 20, left: 180 };

            // Initialize Main Interactive Canvas Environment
            const svg = d3.select("#tree-container")
                .append("svg")
                .attr("viewBox", `0 0 ${width} ${height}`)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const tooltip = d3.select("#tooltip");
            const treeLayout = d3.tree().size([height - margin.top - margin.bottom, width - margin.left - margin.right]);

            // Model parameters managed by slider inputs
            let weights = { germany: 0.85, france: 0.55 };

            function updateTree() {
                // Computed probabilities updated live based on the sliders
                const treeData = {
                    name: "🏟️ Lincoln Financial Field",
                    type: "root",
                    children: [
                        {
                            name: "🇩🇪 Germany (Match 74 Winner)",
                            type: "mid",
                            prob: weights.germany,
                            children: [
                                { name: "🇫🇷 vs. France", prob: weights.france, joint: weights.germany * weights.france },
                                { name: "🇳🇴 vs. Norway", prob: (1 - weights.france) * 0.75, joint: weights.germany * ((1 - weights.france) * 0.75) },
                                { name: "🏴‍☠️ vs. Group I Underdog", prob: (1 - weights.france) * 0.25, joint: weights.germany * ((1 - weights.france) * 0.25) }
                            ]
                        },
                        {
                            name: "🇺🇸 Group E Underdog (Upset Path)",
                            type: "mid",
                            prob: 1 - weights.germany,
                            children: [
                                { name: "🇫🇷 vs. France", prob: weights.france, joint: (1 - weights.germany) * weights.france },
                                { name: "🇳🇴 vs. Norway", prob: (1 - weights.france) * 0.75, joint: (1 - weights.germany) * ((1 - weights.france) * 0.75) },
                                { name: "🏴‍☠️ vs. Group I Underdog", prob: (1 - weights.france) * 0.25, joint: (1 - weights.germany) * ((1 - weights.france) * 0.25) }
                            ]
                        }
                    ]
                };

                const root = d3.hierarchy(treeData);
                treeLayout(root);

                // DATA JOIN: Links (Edges)
                const pathGenerator = d3.linkHorizontal().x(d => d.y).y(d => d.x);
                const links = svg.selectAll(".link").data(root.links());
                
                links.exit().remove();
                
                const linksEnter = links.enter().append("path")
                    .attr("class", "link")
                    .merge(links)
                    .attr("d", pathGenerator);

                // DATA JOIN: Nodes
                const nodes = svg.selectAll(".node").data(root.descendants(), d => d.data.name);

                nodes.exit().remove();

                const nodesEnter = nodes.enter().append("g")
                    .attr("class", d => `node ${d.children ? "" : "node--leaf"}`);

                // Custom Graphical UI Enhancements: Visual anchors instead of basic dots
                nodesEnter.append("rect")
                    .attr("width", 24)
                    .attr("height", 24)
                    .attr("x", -12)
                    .attr("y", -12)
                    .attr("rx", 6)
                    .style("fill", "#1e293b")
                    .style("stroke", "#38bdf8")
                    .style("stroke-width", "1.5px")
                    .style("cursor", "pointer");

                // Text node labels styling inside the layout boundary
                nodesEnter.append("text")
                    .attr("dy", ".35em")
                    .merge(nodes.select("text"))
                    .attr("x", d => d.children ? -18 : 18)
                    .style("text-anchor", d => d.children ? "end" : "start")
                    .text(d => d.data.name);

                // Merge and transition existing elements gracefully
                const nodesMerged = nodesEnter.merge(nodes);
                nodesMerged.attr("transform", d => `translate(${d.y},${d.x})`);

                // Event Listeners for hover and link path tracking
                nodesMerged.selectAll("rect")
                    .on("mouseover", function(event, d) {
                        d3.select(this).style("fill", "#38bdf8").style("stroke", "#f8fafc");

                        // Highlight the path directly leading up to this matchup
                        linksEnter.filter(l => l.target === d || l.source === d).classed("link-active", true);

                        let tooltipHtml = "";
                        if (d.data.type === "root") {
                            tooltipHtml = `<div class="tooltip-header">Host Venue</div><strong>${d.data.name}</strong><br>Philadelphia, July 4th`;
                        } else if (d.data.type === "mid") {
                            tooltipHtml = `<div class="tooltip-header">Feeder Probability</div><strong>${d.data.name}</strong><br><span class="tooltip-stat">${(d.data.prob * 100).toFixed(0)}%</span> chance to reach Philly`;
                        } else {
                            tooltipHtml = `<div class="tooltip-header">Calculated Joint Output</div><strong>${d.data.name} Matchup</strong><br>Total Bracket Probability: <span class="tooltip-stat">${(d.data.joint * 100).toFixed(1)}%</span>`;
                        }


tooltip.style("opacity", 1)
.html(tooltipHtml)
.style("left", (event.pageX + 15) + "px")
.style("top", (event.pageY - 20) + "px");
})
.on("mouseout", function() {
d3.select(this).style("fill", "#1e293b").style("stroke", "#38bdf8");
linksEnter.classed("link-active", false);
tooltip.style("opacity", 0);
});
}
// Bind Event Listeners to Sliders for Dynamic Tuning
d3.select("#germany-slider").on("input", function() {
weights.germany = +this.value / 100;
d3.select("#germany-val").text(this.value + "%");
updateTree();
});
d3.select("#france-slider").on("input", function() {
weights.france = +this.value / 100;
d3.select("#france-val").text(this.value + "%");
updateTree();
});
// Run initial execution layer rendering step
updateTree();
});
